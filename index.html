const SANITY_PROJECT_ID = '77kdc69b';
const SANITY_DATASET = 'production';

async function fetchSanityPosts() {
  const query = encodeURIComponent(
    '*[_type == "post"] | order(publishedAt desc) {_id, title, publishedAt, "category": categories[0]->title, mainImage, body}'
  );
  const url = `https://${SANITY_PROJECT_ID}.api.sanity.io/v2024-01-01/data/query/${SANITY_DATASET}?query=${query}`;
  const res = await fetch(url);
  const data = await res.json();
  return data.result || [];
}

function getSanityImageUrl(image, width = 800) {
  if (!image?.asset?._ref) return null;
  const ref = image.asset._ref
    .replace(/^image-/, '')
    .replace(/-(jpg|jpeg|png|gif|webp|svg)$/, '.$1');
  return `https://cdn.sanity.io/images/${SANITY_PROJECT_ID}/${SANITY_DATASET}/${ref}?w=${width}&auto=format`;
}

function formatDate(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}

function getSummary(body) {
  if (!body) return '';
  const first = body.find(b => b._type === 'block' && b.children);
  if (!first) return '';
  return first.children.map(c => c.text || '').join('');
}

function useInView(threshold = 0.2) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function Cursor({ color = C.green }) {
  return <span style={{ display: "inline-block", width: 9, height: 18, background: color, marginLeft: 2, animation: "blink 1s step-end infinite", verticalAlign: "middle" }} />;
}

function TerminalWindow({ children, title = "unlearning.sh", style }) {

      <div style={{ padding: "28px 24px", minHeight: 160 }}>{children}</div>

function TermLine({ text, showCursor, size = 14 }) {
  const colorize = (t) => {
    if (t.startsWith("$")) return <><span style={{ color: C.green }}>$</span><span style={{ color: C.text }}>{t.slice(1)}</span></>;
    if (t.startsWith("> [ERROR]")) return <span style={{ color: C.red }}>{t}</span>;
    if (t.startsWith("> [WARN]")) return <span style={{ color: C.orange }}>{t}</span>;
    if (t.startsWith("> [OK]")) return <span style={{ color: C.green }}>{t}</span>;
    if (t.startsWith("> [INFO]")) return <span style={{ color: C.cyan }}>{t}</span>;
    if (t.startsWith("#")) return <span style={{ color: C.textFaint, fontStyle: "italic" }}>{t}</span>;
    return <span style={{ color: C.textDim }}>{t}</span>;
  };
  return <div style={{ fontFamily: MONO, fontSize: size, lineHeight: 1.9, whiteSpace: "pre-wrap", wordBreak: "break-word" }}>{colorize(text)}{showCursor && <Cursor />}</div>;
}

}

// 개별 섹션들 (기존 코드 유지)
function HeroSection() {
  const [phase, setPhase] = useState(0);
  const [cmdTyped, setCmdTyped] = useState("");
  const [resLines, setResLines] = useState([]);
  const [showContent, setShowContent] = useState(false);

  const cmd = "$ deploy ai-experts --target='서류_업무' --mode='대신_해결'";
  const results = [
    "> [INFO] 조직 업무 스캔 중...",
    "> [WARN] 반복되는 영수증 정리 발견",
    "> [WARN] 끝없는 보고서 작성 발견",
    "> [OK] 10년차 전문가 & AI 투입 준비 완료.",
  ];

  useEffect(() => {
    let cancelled = false;
    (async () => {
      await new Promise(r => setTimeout(r, 400));
      for (let i = 0; i <= cmd.length; i++) {
        if (cancelled) return; setCmdTyped(cmd.slice(0, i)); await new Promise(r => setTimeout(r, 30));
      }
      setPhase(1); await new Promise(r => setTimeout(r, 300));
      for (const line of results) {
        if (cancelled) return;
        setResLines(prev => [...prev, ""]);
        for (let i = 0; i < line.length; i++) {
          if (cancelled) return;
          setResLines(prev => [...prev.slice(0, -1), line.slice(0, i + 1)]);
          await new Promise(r => setTimeout(r, 20));
        }
        await new Promise(r => setTimeout(r, 200));
      }
      setShowContent(true);
    })();
    return () => { cancelled = true; };
  }, []);

  return (
    <section id="home" style={{
      minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
      padding: "120px 20px 60px", position: "relative",
    }}>
      <div style={{
        position: "absolute", inset: 0, opacity: 0.04,
        backgroundImage: `linear-gradient(${C.green} 1px, transparent 1px), linear-gradient(90deg, ${C.green} 1px, transparent 1px)`,
        backgroundSize: "48px 48px", maskImage: "radial-gradient(ellipse at center, black 30%, transparent 75%)", WebkitMaskImage: "radial-gradient(ellipse at center, black 30%, transparent 75%)",
      }} />

      <div style={{
        textAlign: "center", opacity: showContent ? 1 : 0, transform: showContent ? "translateY(0)" : "translateY(16px)", transition: "all .8s ease", marginBottom: 40, zIndex: 1
      }}>
        <h1 style={{ fontFamily: SANS, fontSize: "clamp(32px, 6vw, 56px)", fontWeight: 900, lineHeight: 1.25, color: C.textBright, letterSpacing: "-.02em", wordBreak: "keep-all", maxWidth: 900, margin: "0 auto" }}>
          {CONTENT.hero.headingLine1}<br />
          <span style={{ color: C.green }}>{CONTENT.hero.headingLine2}</span>
        </h1>
        <p style={{ fontFamily: SANS, fontSize: "clamp(15px, 2vw, 18px)", fontWeight: 300, color: C.textDim, marginTop: 20, lineHeight: 1.8, wordBreak: "keep-all", maxWidth: 640, margin: "20px auto 0", whiteSpace: "pre-line" }}>
          {CONTENT.hero.subtext}
        </p>
      </div>

      <TerminalWindow title="init.sh — /unlearning" style={{ maxWidth: 680, zIndex: 1 }}>
        <div style={{ fontFamily: MONO, fontSize: 14, lineHeight: 1.9 }}>
          <span style={{ color: C.green }}>$</span> <span style={{ color: C.text }}>{cmdTyped.slice(1)}</span>{phase === 0 && <Cursor />}
        </div>
        {resLines.map((line, i) => <TermLine key={i} text={line} showCursor={i === resLines.length - 1 && !showContent} />)}
      </TerminalWindow>
    </section>
  );
}

/* ==========================================================================
   PORTABLE TEXT RENDERER
   ========================================================================== */
function PortableText({ blocks }) {
  if (!blocks) return null;
  return blocks.map((block, i) => {
    if (block._type === 'image') {
      const url = getSanityImageUrl(block, 1000);
      if (!url) return null;
      return <img key={i} src={url} alt="" style={{ maxWidth: '100%', borderRadius: 8, margin: '24px 0', display: 'block' }} />;
    }
    if (block._type === 'youtube') {
      const videoId = block.url?.match(/(?:v=|youtu\.be\/)([^&?/]+)/)?.[1];
      if (!videoId) return null;
      return (
        <div key={i} style={{ position: 'relative', paddingBottom: '56.25%', height: 0, margin: '24px 0' }}>
          <iframe src={`https://www.youtube.com/embed/${videoId}`}
            style={{ position: 'absolute', top: 0, left: 0, width: '100%', height: '100%', border: 0, borderRadius: 8 }}
            allowFullScreen />
        </div>
      );
    }
    if (block._type !== 'block') return null;
    const children = (block.children || []).map((child, j) => {
      const text = child.text || '';
      if (!text) return null;
      const marks = child.marks || [];
      const linkKey = marks.find(m => block.markDefs?.find(d => d._key === m && d._type === 'link'));
      if (linkKey) {
        const def = block.markDefs.find(d => d._key === linkKey);
        return <a key={j} href={def.href} target="_blank" rel="noopener noreferrer" style={{ color: C.green, textDecoration: 'underline' }}>{text}</a>;
      }
      if (marks.includes('strong')) return <strong key={j}>{text}</strong>;
      if (marks.includes('em')) return <em key={j}>{text}</em>;
      if (marks.includes('underline')) return <span key={j} style={{ textDecoration: 'underline' }}>{text}</span>;
      return <span key={j}>{text}</span>;
    });
    const base = { fontFamily: SANS, lineHeight: 1.9, marginBottom: 20, wordBreak: 'keep-all' };
    switch (block.style) {
      case 'h1': return <h1 key={i} style={{ ...base, fontSize: 32, fontWeight: 700, color: C.textBright, marginTop: 40 }}>{children}</h1>;
      case 'h2': return <h2 key={i} style={{ ...base, fontSize: 26, fontWeight: 700, color: C.textBright, marginTop: 32 }}>{children}</h2>;
      case 'h3': return <h3 key={i} style={{ ...base, fontSize: 21, fontWeight: 700, color: C.textBright, marginTop: 28 }}>{children}</h3>;
      case 'h4': return <h4 key={i} style={{ ...base, fontSize: 18, fontWeight: 700, color: C.textBright, marginTop: 24 }}>{children}</h4>;
      case 'blockquote': return <blockquote key={i} style={{ ...base, borderLeft: `4px solid ${C.green}`, paddingLeft: 24, color: C.textDim, fontStyle: 'italic', margin: '24px 0' }}>{children}</blockquote>;
      default: return <p key={i} style={{ ...base, color: C.text }}>{children}</p>;
    }
  });
}

/* ==========================================================================
   APP EXPORT (라우팅 컨트롤러)
   ========================================================================== */
function App() {
  const [view, setView] = useState('home');
  const [posts, setPosts] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    fetchSanityPosts()
      .then(data => setPosts(data))
      .catch(err => {
        console.error('Sanity fetch error:', err);
        setPosts([]);
      })
      .finally(() => setLoading(false));
  }, []);

  const scrollToSection = (id) => {
    if (view !== 'home') {
      setView('home');
      setTimeout(() => {
        document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
      }, 100);
    } else {
      document.getElementById(id)?.scrollIntoView({ behavior: 'smooth' });
    }
  };

  return (
    <div>
      <Nav view={view} setView={setView} scrollToSection={scrollToSection} />
      {view === 'home' && <MainView />}
      {view === 'news' && <NewsListView setView={setView} posts={posts} loading={loading} />}
      {typeof view === 'object' && view.type === 'post' && <NewsDetailView id={view.id} setView={setView} posts={posts} />}
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
